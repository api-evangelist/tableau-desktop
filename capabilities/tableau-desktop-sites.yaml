naftiko: 1.0.0-alpha2
info:
  label: Tableau REST API — Sites
  description: 'Tableau REST API — Sites. 5 operations. Lead operation: Query Sites. Self-contained Naftiko capability covering
    one Tableau Desktop business surface.'
  tags:
  - Tableau Desktop
  - Sites
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TABLEAU_DESKTOP_API_KEY: TABLEAU_DESKTOP_API_KEY
capability:
  consumes:
  - type: http
    namespace: tableau-desktop-sites
    baseUri: https://{tableau-server}/api/3.22
    description: Tableau REST API — Sites business capability. Self-contained, no shared references.
    resources:
    - name: sites
      path: /sites
      operations:
      - name: querysites
        method: GET
        description: Query Sites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsite
        method: POST
        description: Create Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sites-siteId
      path: /sites/{siteId}
      operations:
      - name: querysite
        method: GET
        description: Query Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesite
        method: PUT
        description: Update Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesite
        method: DELETE
        description: Delete Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Tableau-Auth
      value: '{{env.TABLEAU_DESKTOP_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: tableau-desktop-sites-rest
    port: 8080
    description: REST adapter for Tableau REST API — Sites. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sites
      name: sites
      description: REST surface for sites.
      operations:
      - method: GET
        name: querysites
        description: Query Sites
        call: tableau-desktop-sites.querysites
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsite
        description: Create Site
        call: tableau-desktop-sites.createsite
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sites/{siteid}
      name: sites-siteid
      description: REST surface for sites-siteId.
      operations:
      - method: GET
        name: querysite
        description: Query Site
        call: tableau-desktop-sites.querysite
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesite
        description: Update Site
        call: tableau-desktop-sites.updatesite
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesite
        description: Delete Site
        call: tableau-desktop-sites.deletesite
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tableau-desktop-sites-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tableau REST API — Sites. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: query-sites
      description: Query Sites
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tableau-desktop-sites.querysites
      outputParameters:
      - type: object
        mapping: $.
    - name: create-site
      description: Create Site
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tableau-desktop-sites.createsite
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: query-site
      description: Query Site
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tableau-desktop-sites.querysite
      outputParameters:
      - type: object
        mapping: $.
    - name: update-site
      description: Update Site
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: tableau-desktop-sites.updatesite
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-site
      description: Delete Site
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: tableau-desktop-sites.deletesite
      outputParameters:
      - type: object
        mapping: $.
