naftiko: 1.0.0-alpha2
info:
  label: Tableau REST API — Authentication
  description: 'Tableau REST API — Authentication. 2 operations. Lead operation: Sign In. Self-contained Naftiko capability
    covering one Tableau Desktop business surface.'
  tags:
  - Tableau Desktop
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TABLEAU_DESKTOP_API_KEY: TABLEAU_DESKTOP_API_KEY
capability:
  consumes:
  - type: http
    namespace: tableau-desktop-authentication
    baseUri: https://{tableau-server}/api/3.22
    description: Tableau REST API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: auth-signin
      path: /auth/signin
      operations:
      - name: signin
        method: POST
        description: Sign In
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: auth-signout
      path: /auth/signout
      operations:
      - name: signout
        method: POST
        description: Sign Out
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Tableau-Auth
      value: '{{env.TABLEAU_DESKTOP_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: tableau-desktop-authentication-rest
    port: 8080
    description: REST adapter for Tableau REST API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/auth/signin
      name: auth-signin
      description: REST surface for auth-signin.
      operations:
      - method: POST
        name: signin
        description: Sign In
        call: tableau-desktop-authentication.signin
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/signout
      name: auth-signout
      description: REST surface for auth-signout.
      operations:
      - method: POST
        name: signout
        description: Sign Out
        call: tableau-desktop-authentication.signout
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tableau-desktop-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tableau REST API — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: sign
      description: Sign In
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tableau-desktop-authentication.signin
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: sign-out
      description: Sign Out
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tableau-desktop-authentication.signout
      outputParameters:
      - type: object
        mapping: $.
