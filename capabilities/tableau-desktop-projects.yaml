    baseUri: https://{tableau-server}/api/3.22
    description: Tableau REST API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: sites-siteId-projects
      path: /sites/{siteId}/projects
      operations:
      - name: queryprojects
        method: GET
        description: Query Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createproject
        method: POST
        description: Create Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sites-siteId-projects-projectId
      path: /sites/{siteId}/projects/{projectId}
      operations:
      - name: updateproject
        method: PUT
        description: Update Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteproject
