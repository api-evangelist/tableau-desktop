    port: 9090
    transport: http
    description: MCP adapter for Tableau REST API — Projects. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: query-projects
      description: Query Projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tableau-desktop-projects.queryprojects
      outputParameters:
      - type: object
        mapping: $.
    - name: create-project
