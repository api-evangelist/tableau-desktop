    namespace: tableau-desktop-projects-rest
    port: 8080
    description: REST adapter for Tableau REST API — Projects. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sites/{siteid}/projects
      name: sites-siteid-projects
      description: REST surface for sites-siteId-projects.
      operations:
      - method: GET
        name: queryprojects
        description: Query Projects
        call: tableau-desktop-projects.queryprojects
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createproject
        description: Create Project
        call: tableau-desktop-projects.createproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sites/{siteid}/projects/{projectid}
      name: sites-siteid-projects-projectid
      description: REST surface for sites-siteId-projects-projectId.
      operations:
      - method: PUT
        name: updateproject
        description: Update Project
        call: tableau-desktop-projects.updateproject
